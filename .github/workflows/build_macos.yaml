---
name: build-macos

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  build-macos-static:
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: install build deps
        run: |
          brew install coreutils

      - name: load env vars for workflow run
        run: |
          source .github/vars.env
          echo "ZIG_VERSION=$ZIG_VERSION" >> "$GITHUB_ENV"

      - name: setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: build the static library
        run: |
          make release-macos-static

  build-macos-dynamic:
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: install build deps
        run: |
          brew install coreutils pcre2 libssh2

      - name: load env vars for workflow run
        run: |
          source .github/vars.env
          echo "ZIG_VERSION=$ZIG_VERSION" >> "$GITHUB_ENV"

      - name: setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: build the dynamic library
        run: |
          make release-macos-dynamic

