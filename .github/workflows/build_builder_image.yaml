---
name: build-builder-image

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  build-builder-image:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build builder image
        run: |
          docker build \
            -f build/builder.Dockerfile \
            -t ghcr.io/scrapli/libscrapli/builder:dev-latest \
            build/

      - name: push builder (dev) image to ghcr
        if: github.repository == 'scrapli/libscrapli'
        run: |
          docker push ghcr.io/scrapli/libscrapli/builder:dev-latest
